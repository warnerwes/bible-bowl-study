name: Deploy to GitHub Pages

# Builds and publishes the static Bible Bowl Study site to GitHub Pages.
# Requires: repo Settings → Pages → "Build and deployment" → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate + build question library
        run: node scripts/build.js

      - name: Assemble publishable site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js manifest.webmanifest sw.js _site/
          cp icon-192.png icon-512.png icon-maskable-512.png apple-touch-icon.png _site/
          cp favicon.png favicon-16.png favicon-32.png _site/
          mkdir -p _site/data
          cp data/questions.json _site/data/
          if [ -f data/review-candidates.json ]; then cp data/review-candidates.json _site/data/; fi
          if [ -f data/vote-sink.json ]; then cp data/vote-sink.json _site/data/; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (source = GitHub Actions) so no manual repo
          # setting is required before the first deploy.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
